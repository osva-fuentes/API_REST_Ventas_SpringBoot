name: Build & Deploy API Ventas

on:
  repository_dispatch:
    types:
      - backend-ventas
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ventas-api
  EKS_CLUSTER_NAME: nota3-Cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push de la imagen Docker a ECR
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          context: ./Springboot-API-REST
          file: ./Springboot-API-REST/Dockerfile

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Actualizar kubeconfig para EKS
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Crear o actualizar Secret de BD en el cluster
        run: |
          kubectl create secret generic db-credentials \
            --from-literal=DB_ENDPOINT="${{ secrets.DB_ENDPOINT }}" \
            --from-literal=DB_PORT="${{ secrets.DB_PORT }}" \
            --from-literal=DB_NAME="${{ secrets.DB_NAME }}" \
            --from-literal=DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy a EKS
        run: kubectl apply -f k8s/

      - name: Reiniciar Deployment para tomar nueva imagen
        run: kubectl rollout restart deployment/back-ventas

      - name: Esperar rollout
        run: kubectl rollout status deployment/back-ventas --timeout=120s
